<!doctype html><html lang=en><head><meta charset=utf-8><title>Change password</title></head><body>
  <h1>Change password</h1>
  <form>
    <label>Current password</label><input type="password" autocomplete="current-password" name="current">
    <label>New password</label><input type="password" autocomplete="new-password" name="new">
    <label>Confirm new password</label><input type="password" autocomplete="new-password" name="confirm">
    <button type="submit">Update password</button>
  </form></body></html>

<!doctype html><html lang=en><head><meta charset=utf-8><title>Log in to your PayPal account</title></head><body>
<h1>Log in</h1>
<form method="post" action="/signin">
  <label for="email">Email or mobile number</label>
  <input type="email" name="login_email" id="email" autocomplete="username webauthn">
  <input type="text" name="captchaCode" id="splitHybridCaptcha" autocomplete="off" placeholder="Enter code">
  <label for="password">Password</label>
  <input type="password" name="login_password" id="password" autocomplete="username webauthn">
  <input type="text" name="captcha" id="splitPasswordCaptcha" autocomplete="off" placeholder="Enter code">
  <button type="submit" id="btnLogin">Login</button>
  <button type="button">Log in with Passkey</button>
</form></body></html>

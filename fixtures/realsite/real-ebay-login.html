<!doctype html><html lang=en><head><meta charset=utf-8><title>Sign in or Register | eBay</title></head><body>
<h1>Sign in to your account</h1>
<form method="post" action="/signin/">
  <label for="userid">Email or username</label>
  <input type="text" name="userid" id="userid" autocomplete="username webauthn">
  <label for="pass">Password</label>
  <input type="password" name="pass" id="pass" autocomplete="current-password">
  <button type="submit">Sign in</button>
</form></body></html>

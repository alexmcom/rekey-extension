<!doctype html><html lang=en><head><meta charset=utf-8><title>Log In - Twitch</title></head><body>
<h1>Log In</h1>
<form>
  <label for="login-username">Username</label>
  <input type="text" id="login-username" autocomplete="username">
  <label for="password-input">Password</label>
  <input type="password" id="password-input" autocomplete="current-password">
  <button type="submit">Log In</button>
</form>
<a href="/signup">Don't have an account? Sign up</a></body></html>

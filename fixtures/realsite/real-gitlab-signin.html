<!doctype html><html lang=en><head><meta charset=utf-8><title>Sign in - GitLab</title></head><body>
<h1>Sign in</h1>
<form>
  <label for="user_login">Username or email</label>
  <input type="text" name="user[login]" autocomplete="username" id="user_login">
  <label for="user_password">Password</label>
  <input type="password" name="user[password]" autocomplete="current-password" id="user_password">
  <label for="user_remember_me"><input type="checkbox" id="user_remember_me"> Remember me</label>
  <button type="submit">Sign in</button>
</form></body></html>

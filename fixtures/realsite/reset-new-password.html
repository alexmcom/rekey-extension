<!doctype html><html lang=en><head><meta charset=utf-8><title>Reset password</title></head><body>
  <h1>Choose a new password</h1>
  <form>
    <label>New password</label><input type="password" autocomplete="new-password" name="new">
    <label>Confirm password</label><input type="password" autocomplete="new-password" name="confirm">
    <button type="submit">Set password</button>
  </form></body></html>

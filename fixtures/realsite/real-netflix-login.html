<!doctype html><html lang=en><head><meta charset=utf-8><title>Netflix</title></head><body>
<h1>Sign In</h1>
<form method="post" action="/login">
  <label for="id_userLoginId">Email or mobile number</label>
  <input type="text" name="userLoginId" id="id_userLoginId" autocomplete="email">
  <label for="id_password">Password</label>
  <input type="password" name="password" id="id_password" autocomplete="password">
  <button type="submit">Continue</button>
</form></body></html>

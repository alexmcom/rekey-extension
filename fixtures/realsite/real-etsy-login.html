<!doctype html><html lang=en><head><meta charset=utf-8><title>Sign in | Etsy</title></head><body>
<h1>Sign in</h1>
<div class="signin-panel">
  <label for="input-1">Email</label>
  <input type="email" name="email" id="input-1" autocomplete="email" placeholder="Enter your email">
  <label for="input-2">Password</label>
  <input type="password" name="password" id="input-2" autocomplete="current-password" placeholder="Enter password">
  <button type="submit">Sign in</button>
  <button type="button">Register</button>
</div></body></html>

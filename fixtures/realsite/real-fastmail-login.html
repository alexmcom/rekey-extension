<!doctype html><html lang=en><head><meta charset=utf-8><title>Log in | Fastmail</title></head><body>
<h1>Log in</h1>
<form method="post" action="/login/">
  <label for="v21-input">Username</label>
  <input type="text" name="username" id="v21-input" autocomplete="username webauthn">
  <label for="v16-input">Password</label>
  <input type="password" name="current-password" id="v16-input" autocomplete="current-password">
  <button type="submit">Continue</button>
</form></body></html>

<!doctype html><html lang=en><head><meta charset=utf-8><title>Stripe Login | Sign in to the Stripe Dashboard</title></head><body>
<h1>Sign in to your account</h1>
<form method="post" action="/login">
  <label for="email">Email</label>
  <input type="email" name="email" id="email" autocomplete="username email">
  <label for="old-password">Password <a href="/forgot">Forgot your password?</a></label>
  <input type="password" name="password" id="old-password" autocomplete="current-password">
  <button type="submit">Sign in</button>
</form></body></html>

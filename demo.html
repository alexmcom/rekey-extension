<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rekey Full walkthrough</title>
<style>
:root{
  --ink:#161022; --ink2:#241a36; --line:#372a4d; --muted:#a99cc2;
  --pink:#d4438d; --pink-2:#e878b0; --violet:#9a7fd0;
  --paper:#f6f1fb; --ok:#43c98a; --warn:#f0b64a; --danger:#ff6b70;
  --rk-ink:#2b2145; --rk-ink-soft:#5f5378; --rk-accent:#c1509f; --rk-line:rgba(96,74,146,0.16);
  --rk-paper:#fdfbff; --rk-ok:#1f9e63;
}
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden}
body{background:#0d0a16;display:flex;align-items:center;justify-content:center;min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.stage{position:relative;width:1280px;height:720px;border-radius:14px;overflow:hidden;
  box-shadow:0 30px 90px rgba(0,0,0,.55);background:#0f1418;transform:scale(var(--s,1));transform-origin:center}
.chrome{height:52px;background:#e7e2ee;border-bottom:1px solid #d3cce0;display:flex;align-items:center;gap:12px;padding:0 16px;position:relative;z-index:5}
.lights{display:flex;gap:8px}.lights i{width:12px;height:12px;border-radius:50%;display:block}
.lights .r{background:#ff5f57}.lights .y{background:#febc2e}.lights .g{background:#28c840}
.omni{flex:1;height:32px;background:#fbf9ff;border:1px solid #d9d2e8;border-radius:16px;display:flex;align-items:center;padding:0 14px;color:#5f5378;font-size:13px;gap:8px}
.omni svg{width:13px;height:13px;flex:none;opacity:.6}
.rkico{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#2a1c3e,#4a2c55);position:relative;box-shadow:0 0 0 2px #fff,0 0 0 3px #e7c6dd}
.rkico::after{content:"";position:absolute;width:9px;height:9px;border:2px solid var(--pink);border-radius:50%;top:4px;left:4px}
.rkico::before{content:"";position:absolute;width:2px;height:7px;background:var(--pink);transform:rotate(45deg);bottom:3px;right:6px}
.rkbadge{position:absolute;top:-4px;right:-4px;background:var(--pink);color:#fff;font-size:9px;font-weight:800;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.page{position:absolute;inset:52px 0 0 0;overflow:hidden}
.pagebg-plain{background:radial-gradient(120% 90% at 18% -10%,#f4ecfb,#ece4f7 55%,#e7dff4)}
.pagebg-dark{background:#0f1418}
.pcenter{position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px}
.rk-card{max-width:520px;width:100%;background:var(--rk-paper);border:1px solid rgba(96,74,146,.12);border-radius:20px;padding:30px 32px;box-shadow:0 18px 50px rgba(60,40,110,.10)}
.brand{font-family:Georgia,serif;font-style:italic;font-size:18px;margin-bottom:2px;color:var(--rk-ink)}
.rk-card h2{font-family:'Segoe UI',system-ui,sans-serif;font-weight:600;color:var(--rk-ink);margin:2px 0 8px;font-size:24px;letter-spacing:-.3px}
.rk-card p{margin:0 0 6px;color:var(--rk-ink-soft);font-size:14px;line-height:1.5}
.cur{background:rgba(255,255,255,.6);border:1px solid var(--rk-line);border-radius:12px;padding:12px 14px;margin:14px 0;font-size:15px;color:var(--rk-ink-soft)}
.cur code{font-weight:700;color:var(--rk-accent);font-size:16px}
.rk-card label{display:block;font-weight:600;font-size:13px;color:var(--rk-ink);margin:14px 0 5px}
.rk-field{width:100%;font-family:inherit;font-size:16px;color:var(--rk-ink);padding:13px 15px;background:rgba(255,255,255,.75);border:1px solid var(--rk-line);border-radius:12px;outline:none;transition:.15s}
.rk-field.focus{border-color:var(--rk-accent);box-shadow:0 0 0 3px rgba(193,80,159,.14)}
.rk-btn{display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;width:100%;margin-top:16px;padding:13px 24px;border-radius:999px;border:none;background:var(--rk-ink);color:var(--rk-paper);cursor:pointer}
.msg{margin-top:16px;font-weight:600;min-height:22px;font-size:15px}.msg.ok{color:var(--rk-ok)}.msg.bad{color:#c93a3a}
.sw{position:absolute;inset:0;display:flex}
.sw .pleft{flex:1.15;background:linear-gradient(150deg,#0a3d3a,#0e5b4e 45%,#12463f);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 60px;color:#eafff7}
.sw .pleft::after{content:"";position:absolute;inset:0;background:radial-gradient(60% 50% at 80% 20%,rgba(52,211,153,.25),transparent 60%),radial-gradient(50% 40% at 10% 90%,rgba(16,185,129,.22),transparent 60%)}
.sw .wave{position:absolute;bottom:0;left:0;right:0;height:130px;opacity:.5}
.slogo{display:flex;align-items:center;gap:12px;position:relative;z-index:2;margin-bottom:26px}
.slogo .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#34d399,#10b981);display:flex;align-items:center;justify-content:center}
.slogo .mark svg{width:22px;height:22px}
.slogo .name{font-size:22px;font-weight:800;letter-spacing:-.3px}
.sw .pleft h1{position:relative;z-index:2;font-size:38px;line-height:1.1;margin:0 0 16px;font-weight:800;letter-spacing:-1px}
.sw .pleft p{position:relative;z-index:2;font-size:16px;color:#bfeee0;max-width:34ch;line-height:1.5;margin:0}
.sw .pright{flex:1;background:#0f1418;display:flex;align-items:center;justify-content:center;padding:0 56px}
.swform{width:100%;max-width:360px;color:#e8eef0}
.swform h2{font-size:25px;margin:0 0 6px;font-weight:700;letter-spacing:-.4px}
.swform .lede{color:#9fb0b3;font-size:14px;margin:0 0 24px}
.swform label{display:block;font-size:12.5px;color:#9fb0b3;margin:15px 0 6px;font-weight:600}
.fld{width:100%;padding:13px 14px;border-radius:11px;border:1px solid #263238;background:#141c20;color:#e8eef0;font-size:15px;outline:none;transition:.15s}
.fld.focus{border-color:#34d399;box-shadow:0 0 0 3px rgba(52,211,153,.15)}
.swerr{color:#ff6b6b;font-size:12.5px;margin-top:10px;min-height:16px;font-weight:600}
.meter{height:5px;border-radius:99px;background:#1e2a2e;margin-top:9px;overflow:hidden}
.meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,#34d399,#10b981);transition:width .5s ease}
.mlabel{font-size:11.5px;color:#6b7a7e;margin-top:6px;min-height:14px}.mlabel.strong{color:#34d399;font-weight:700}
.screate{width:100%;margin-top:22px;padding:14px;border:none;border-radius:11px;background:linear-gradient(135deg,#34d399,#10b981);color:#04231c;font-weight:800;font-size:15px;cursor:pointer}
.swsuccess{position:absolute;inset:0;background:#0f1418;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;transition:opacity .5s;pointer-events:none;z-index:6}
.swsuccess.show{opacity:1}
.swsuccess .check{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#34d399,#10b981);display:flex;align-items:center;justify-content:center;font-size:38px;color:#04231c}
.swsuccess h2{color:#e8eef0;font-size:26px;margin:6px 0 0;font-weight:800}.swsuccess p{color:#9fb0b3;font-size:15px;margin:0}
.rkcard{position:absolute;top:16px;right:16px;width:320px;background:#14141b;color:#f5f5f7;border:1px solid #2a2a35;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.45);padding:16px;z-index:40;opacity:0;transform:translateY(-8px);transition:opacity .2s,transform .2s}
.rkcard.show{opacity:1;transform:none}
.rkcard .rbrand{font-weight:800;font-size:13px;letter-spacing:.5px;margin-bottom:8px}.rkcard .rbrand .k{color:#ec4899}
.rkcard .q{font-size:14px;line-height:1.4;margin-bottom:4px}
.rkcard .rsite{font-weight:700}.rkcard .rsub{color:#a1a1aa;font-size:12px;margin-bottom:14px;line-height:1.4}
.rkcard .rrow{display:flex;gap:8px}
.rkcard button{flex:1;font-size:13px;font-weight:700;padding:9px 10px;border-radius:9px;cursor:pointer;border:1px solid transparent}
.rkcard .go{background:#ec4899;color:#fff}.rkcard .skip{background:transparent;color:#d4d4d8;border-color:#3a3a45}
.rkcard .done{font-size:13px;color:#34d399;font-weight:700;padding:2px 0}
.popup{position:absolute;top:8px;right:26px;width:340px;border-radius:12px;overflow:hidden;opacity:0;transform:translateY(-10px) scale(.98);transform-origin:top right;
  transition:opacity .3s,transform .3s cubic-bezier(.2,.9,.3,1.2);box-shadow:0 24px 60px rgba(0,0,0,.4);z-index:38;
  background:radial-gradient(130% 80% at 50% -12%,rgba(154,127,208,.2),transparent 62%),var(--ink);color:var(--paper);font-size:14px;line-height:1.45}
.popup.show{opacity:1;transform:none}
.popup header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.popup .logo{font-family:Georgia,serif;font-style:italic;font-weight:500;font-size:22px;color:var(--paper)}
.hgroup{display:flex;align-items:center;gap:8px}
.badge{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--pink);border:1px solid var(--pink);border-radius:999px;padding:2px 8px;text-transform:uppercase}
.lockbtn{background:none;border:none;color:var(--muted);font-size:12px}
.tabs{display:flex;gap:4px;padding:0 12px 8px}
.tab{flex:1;text-align:center;padding:7px;border-radius:8px;color:var(--muted);font-weight:600;font-size:12px}
.tab.active{background:var(--ink2);color:var(--paper)}
.pmain{padding:6px 16px 8px}
.gatebox{background:var(--ink2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:12px;font-size:12.5px;line-height:1.5;color:#c4ccdb}
.gatebox b{color:var(--paper)}
.plabel{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
.pinput{width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);background:var(--ink2);color:var(--paper);font-size:14px}
.hint{color:var(--muted);font-size:11.5px;margin-top:8px}
.secretbox{font-family:ui-monospace,Menlo,monospace;font-size:13px;color:#cdd3dd;background:var(--ink);border:1px solid var(--line);border-radius:6px;padding:8px;margin-top:4px;display:flex;justify-content:space-between;gap:8px}
.toolbar{display:flex;gap:8px;margin-bottom:6px}
.btn{width:100%;padding:11px;border:none;border-radius:999px;background:var(--pink);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.btn:disabled{opacity:.5}
.btn.ghost{background:var(--ink2);border:1px solid var(--line)}
.toolbar .btn{padding:9px;font-size:12.5px}
.settoggle{width:100%;padding:9px;border:none;border-radius:999px;background:var(--ink2);border:1px solid var(--line);color:var(--paper);font-weight:700;font-size:12.5px;margin-bottom:8px;text-align:left;padding-left:14px}
.setpanel{border:1px solid var(--line);border-radius:12px;padding:8px;margin-bottom:10px;background:rgba(0,0,0,.15)}
.setrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.setrow span{color:var(--muted);font-size:12px;flex:1}
.setrow select{padding:6px 8px;border-radius:8px;border:1px solid var(--line);background:var(--ink2);color:var(--paper);font-size:12.5px}
.importbox,.syncbox{border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-top:8px;background:var(--ink2);font-size:12.5px;color:#c4ccdb}
.importbox .prow{padding:4px 0;border-top:1px solid #ffffff10;display:flex;justify-content:space-between;gap:8px}
.importbox .prow .ok{color:var(--ok)}.importbox .prow .warn{color:var(--warn)}
.qr{width:96px;height:96px;border-radius:8px;background:
  repeating-linear-gradient(90deg,#fff 0 6px,#161022 6px 12px),
  repeating-linear-gradient(0deg,#fff 0 6px,#161022 6px 12px);background-blend-mode:multiply;margin:8px auto;border:5px solid #fff}
.status{font-size:12px;color:var(--muted);margin:6px 0;min-height:16px}
.health{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 10px}
.hc{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;background:var(--ink2);color:var(--muted)}
.hc.bad{background:rgba(255,90,95,.15);color:var(--danger)}.hc.warn{background:rgba(255,176,32,.15);color:var(--warn)}.hc.ok{background:rgba(47,210,122,.15);color:var(--ok)}
.bulkbtn{width:100%;padding:12px;border:none;border-radius:999px;background:var(--pink);color:#fff;font-weight:700;font-size:14px;margin:0 0 10px;display:flex;align-items:center;justify-content:center;gap:6px}
.bulkprog{border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin:0 0 10px;background:var(--ink2);font-size:12.5px}
.bulkprog .phead{font-weight:700;margin-bottom:8px}
.bulkprog .prow{padding:5px 0;border-top:1px solid #ffffff10;color:#c4ccdb;display:flex;justify-content:space-between;gap:8px}
.bulkprog .prow .ok{color:var(--ok)}.bulkprog .prow .run{color:var(--muted)}
.acct{border:1px solid var(--line);border-radius:14px;padding:11px 12px;margin:8px 0;background:var(--ink2)}
.acct .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sitehead{display:flex;align-items:center;gap:10px;min-width:0}
.favmono{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;background:linear-gradient(135deg,#6d4b8f,#9a7fd0)}
.site{font-weight:700}.user{color:var(--muted);font-size:12px}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
.pill.safe,.pill.fresh{background:rgba(47,210,122,.15);color:var(--ok)}
.pill.breached{background:rgba(255,90,95,.15);color:var(--danger)}
.pill.unknown{background:rgba(154,163,178,.15);color:var(--muted)}
.secret{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#cdd3dd;background:var(--ink);border:1px solid var(--line);border-radius:6px;padding:6px 8px;margin-top:8px;display:flex;justify-content:space-between;gap:8px}
.link{color:var(--pink);font-size:11.5px;font-weight:600;background:none;border:none}
.breachnote{color:var(--danger);font-size:12px;margin-top:7px;font-weight:600}
.safenote{color:var(--ok);font-size:12px;margin-top:7px;font-weight:600}
.reusednote{color:var(--warn);font-size:12px;margin-top:7px;font-weight:600}
.suspectnote{color:var(--warn);font-size:12px;margin-top:7px;font-weight:600}
.linknote{color:#8fa6ff;font-size:12px;margin-top:7px;font-weight:600}
.acct .actions{display:flex;gap:8px;margin-top:9px}.acct .actions .btn{font-size:12.5px;padding:8px}
.acardstatus{font-size:12px;color:#cdd3dd;margin-top:8px}.acardstatus .ok{color:var(--ok);font-weight:700}.acardstatus .step{color:#cdd3dd}
.moreline{text-align:right;margin-top:8px}.moreline .link{margin-left:8px}
.rcpt{border-left:2px solid var(--pink);padding:8px 10px;margin:8px 0;background:var(--ink2);border-radius:0 8px 8px 0}
.rcpt .t{font-size:11px;color:var(--muted)}.rcpt .m{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;color:#cdd3dd;margin-top:3px}
.pfooter{border-top:1px solid var(--line);padding:9px 16px;color:var(--muted);font-size:11px;text-align:center}
.hidden{display:none}
.cursor{position:absolute;width:22px;height:22px;z-index:50;left:640px;top:400px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));transition:left .65s cubic-bezier(.5,0,.2,1),top .65s cubic-bezier(.5,0,.2,1);pointer-events:none}
.cursor.click{animation:clk .3s ease}@keyframes clk{0%,100%{transform:scale(1)}45%{transform:scale(.8)}}
.ripple{position:absolute;z-index:49;width:12px;height:12px;border-radius:50%;background:rgba(212,67,141,.5);transform:translate(-50%,-50%) scale(0);pointer-events:none}
.ripple.go{animation:rip .5s ease-out}@keyframes rip{0%{transform:translate(-50%,-50%) scale(0);opacity:.7}100%{transform:translate(-50%,-50%) scale(5);opacity:0}}
.caption{position:absolute;left:50%;bottom:30px;transform:translateX(-50%) translateY(12px);z-index:60;background:rgba(16,10,24,.9);color:#fff;font-size:19px;font-weight:600;padding:12px 22px;border-radius:12px;opacity:0;transition:opacity .4s,transform .4s;box-shadow:0 8px 30px rgba(0,0,0,.4);max-width:82%;text-align:center}
.caption.show{opacity:1;transform:translateX(-50%) translateY(0)}
.caption .sub{display:block;font-size:12px;font-weight:500;color:#b9a9cc;margin-top:3px}
.chapter{position:absolute;inset:0;z-index:65;background:radial-gradient(120% 90% at 50% 40%,#1c1330,#0d0a16);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;transition:opacity .45s;pointer-events:none}
.chapter.show{opacity:1}
.chapter .cnum{font-size:14px;font-weight:800;letter-spacing:3px;color:var(--pink);text-transform:uppercase}
.chapter .ctitle{font-family:Georgia,serif;font-style:italic;font-size:42px;color:#fff;text-align:center;max-width:74%;line-height:1.15}
.endcard{position:absolute;inset:0;z-index:70;background:radial-gradient(120% 90% at 50% 30%,#1c1330,#0d0a16);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;transition:opacity .6s;pointer-events:none}
.endcard.show{opacity:1}
.endcard .ename{font-family:Georgia,serif;font-style:italic;font-size:56px;color:#fff}
.endcard .etag{font-size:21px;color:#d9cbe9;font-weight:500;text-align:center;max-width:72%;line-height:1.4}
.endcard .eurl{margin-top:8px;font-size:16px;color:var(--pink);font-weight:700;letter-spacing:.5px}
.replay{position:absolute;right:16px;bottom:14px;z-index:80;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;opacity:0;transition:opacity .3s}
.replay.show{opacity:1}
.progress{position:absolute;top:0;left:0;height:3px;background:var(--pink);width:0;z-index:90;transition:width .3s linear}
.gate{position:absolute;inset:0;z-index:85;background:radial-gradient(120% 90% at 50% 35%,#1c1330,#0d0a16);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer}
.gate.hidden{display:none}
.gate .ptitle{font-family:Georgia,serif;font-style:italic;font-size:30px;color:#fff}
.gate .pbtn{width:88px;height:88px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 40px rgba(212,67,141,.5);transition:transform .2s}
.gate:hover .pbtn{transform:scale(1.06)}
.gate .pbtn svg{width:34px;height:34px;margin-left:5px}
.gate .psub{font-size:14px;color:#b9a9cc}
.stage.pfs{position:fixed;top:50%;left:50%;z-index:99999;border-radius:0}
#pfsback{position:fixed;inset:0;background:#0d0a16;z-index:99998;display:none}
#pfsback.show{display:block}
.ctrls{position:absolute;bottom:14px;left:16px;z-index:82;display:none;gap:8px}
.ctrls.show{display:flex}
.ctrls button{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:999px;
  min-width:38px;height:34px;padding:0 12px;font-size:13px;font-weight:700;cursor:pointer;line-height:1;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ctrls button:hover{background:rgba(255,255,255,.24)}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="progress" id="progress"></div>
  <div class="chrome">
    <div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div>
    <div class="omni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg><span id="omniUrl">getrekey.com</span></div>
    <div class="rkico"><span class="rkbadge" id="rkbadge">1</span></div>
  </div>
  <div class="page" id="page"></div>
  <div class="rkcard" id="rkcard"><div id="rkbody"></div></div>
  <div class="popup" id="popup"><div id="popupInner"></div></div>
  <div class="ripple" id="ripple"></div>
  <svg class="cursor" id="cursor" viewBox="0 0 24 24"><path d="M5 2l14 11-6 1 4 7-3 1-4-7-5 4z" fill="#fff" stroke="#222" stroke-width="1.3" stroke-linejoin="round"/></svg>
  <div class="caption" id="caption"></div>
  <div class="chapter" id="chapter"><div class="cnum" id="cnum"></div><div class="ctitle" id="ctitle"></div></div>
  <div class="endcard" id="endcard">
    <div class="ename">Rekey</div>
    <div class="etag">Sets up in a minute. Generates, fills, and gets your breached passwords fixed, guided and never locked out.</div>

/* pausable clock: every delay is registered so Pause can freeze the whole timeline */
let paused=false; const _timers=new Set();
function wait(ms){return new Promise(resolve=>{
  const rec={remaining:ms,last:Date.now(),id:null,resolve};
  rec.arm=()=>{rec.last=Date.now();rec.id=setTimeout(()=>{_timers.delete(rec);resolve();},rec.remaining);};
  rec.hold=()=>{if(rec.id){clearTimeout(rec.id);rec.remaining-=Date.now()-rec.last;rec.id=null;}};
  _timers.add(rec); if(!paused)rec.arm();
});}
let curVo=null;
function pauseTour(){if(paused||!running)return;paused=true;_timers.forEach(t=>t.hold());try{if(MUSIC)MUSIC.pause();}catch(_){}try{if(curVo)curVo.pause();}catch(_){}
  const b=$('ppBtn');if(b)b.textContent='▶';}
function resumeTour(){if(!paused)return;paused=false;_timers.forEach(t=>t.arm());try{if(MUSIC)MUSIC.play();}catch(_){}try{if(curVo)curVo.play();}catch(_){}
  const b=$('ppBtn');if(b)b.textContent='❙❙';}
function togglePause(){paused?resumeTour():pauseTour();}

async function clickFx(){const c=$('cursor');const x=parseFloat(c.style.left),y=parseFloat(c.style.top);const r=$('ripple');r.style.left=x+'px';r.style.top=y+'px';r.classList.remove('go');void r.offsetWidth;r.classList.add('go');c.classList.remove('click');void c.offsetWidth;c.classList.add('click');await wait(280);}
async function clickEl(sel,ms=600){const el=typeof sel==='string'?document.querySelector(sel):sel;if(!el)return;const c=centre(el);await moveTo(c[0],c[1],ms);await clickFx();}

function fit(){const el=$('stage');
  if(pseudoFS){const w=window.innerWidth,h=window.innerHeight,portrait=h>w;
    if(portrait){const s=Math.min(h/1280,w/720);el.style.transform=`translate(-50%,-50%) rotate(90deg) scale(${s})`;}
    else{const s=Math.min(w/1280,h/720);el.style.transform=`translate(-50%,-50%) scale(${s})`;}
    return;}
  el.style.transform='';
  const fs=!!document.fullscreenElement;const w=fs?screen.width:window.innerWidth,h=fs?screen.height:window.innerHeight;
  const s=Math.min(w/1280,h/720);el.style.setProperty('--s',s);}
window.addEventListener('resize',fit);fit();
window.play=play;window.startShow=startShow;preloadAudio();
